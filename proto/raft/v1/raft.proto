syntax = "proto3";

package raft.v1;

option go_package = "github.com/alipourhabibi/raft/gen/go/raft";

enum Role {
  UNSPECIFIED = 0;
  FOLLOWER = 1;
  CANDIDATE = 2;
  LEADER = 3;
}

enum EntryType {
  ENTRY_TYPE_COMMAND = 0;
  ENTRY_TYPE_CONFIG = 1; // C_new (phase 2)
  ENTRY_TYPE_CONFIG_JOINT = 2; // C_old,new (phase 1)
}

message ClusterConfig {
  map<string, string> nodes = 3;
}

message Entry {
  string command = 1;
  uint64 term = 2;
  EntryType type = 3;
  ClusterConfig config = 4;
}

message RequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated Entry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
}

message SubmitRequest {
  string data = 1;
}

message SubmitResponse {
  bool success = 1;
  string leader_id = 2;
}

message ChangeNodesRequest {
  repeated string add_ids    = 1;
  repeated string remove_ids = 2;
  map<string, string> add_nodes = 3; // id → url for new nodes
}

message ChangeNodesResponse {
  bool success = 1;
  optional string leader_id = 2;
}

service RaftService {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc Submit(SubmitRequest) returns (SubmitResponse);
  rpc ChangeNodes(ChangeNodesRequest) returns (ChangeNodesResponse);
}
